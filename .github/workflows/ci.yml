name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download deps
        run: go mod download

      - name: Format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -vet=off ./...
